version: "3.9"

# Local development stack: agent + Redis
# For production add Postgres and point DATABASE_URL accordingly.
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up --build agent    # rebuild agent only
#   docker compose logs -f agent       # stream agent logs

services:
  agent:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379
    volumes:
      # Persist SQLite database across container restarts in dev
      - ./calls.db:/app/calls.db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
